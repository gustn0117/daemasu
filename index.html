<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOA 대마수 - 露芽</title>
    <meta property="og:title" content="LOA 대마수 - 프리미엄 천연 햄프음료">
    <meta property="og:description" content="100% 증류 원액으로 완성한 프리미엄 천연 햄프음료. 露芽(로아)">
    <meta property="og:image" content="https://daemasu.hsweb.pics/og-image.png">
    <meta property="og:url" content="https://daemasu.hsweb.pics">
    <meta property="og:type" content="website">
    <meta name="description" content="100% 증류 원액으로 완성한 프리미엄 천연 햄프음료. 露芽(로아)">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #fff; color: #000; }
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(35,70,45,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav .logo-area { display: flex; align-items: center; }
        nav .logo-area a { text-decoration: none; display: flex; align-items: baseline; gap: 8px; }
        nav .logo-area .logo-main { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: 4px; font-family: 'Arial Black', 'Helvetica Neue', sans-serif; }
        nav .logo-area .logo-sub { font-size: 22px; color: #fff; letter-spacing: 2px; font-weight: 400; }
        /* Hamburger button - hidden on desktop */
        .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
        .hamburger span { display: block; width: 24px; height: 2px; background: #fff; margin: 5px 0; transition: all 0.3s; }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
        /* Desktop nav */
        nav .nav-links { display: flex; gap: 30px; list-style: none; align-items: center; }
        nav .nav-links > li { display: flex; align-items: center; }
        nav .nav-links > li > a { color: #fff; text-decoration: none; font-size: 15px; letter-spacing: 2px; font-weight: 600; transition: color 0.3s; }
        nav .nav-links > li > a:hover { color: #ccc; }
        .lang-selector { position: relative; }
        .lang-btn { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #fff; font-size: 15px; letter-spacing: 2px; font-weight: 600; background: none; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; padding: 5px 12px; transition: all 0.3s; }
        .lang-btn:hover { border-color: rgba(255,255,255,0.5); }
        .lang-btn .flag { font-size: 16px; }
        .lang-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); overflow: hidden; min-width: 160px; z-index: 200; }
        .lang-dropdown.open { display: block; }
        .lang-dropdown a { display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: #000 !important; text-decoration: none; font-size: 15px; font-weight: 500; letter-spacing: 0 !important; transition: background 0.2s; white-space: nowrap; }
        .lang-dropdown a:hover { background: #eee; }
        .lang-dropdown a .flag { font-size: 20px; line-height: 1; }
        .lang-dropdown a.active { background: #d4e8da; font-weight: 700; color: #1a3d25 !important; }
        .img-section { width: 100%; max-width: 1200px; margin: 0 auto; line-height: 0; }
        .img-section img { width: 100%; height: auto; display: block; object-fit: contain; }
        #hero { padding-top: 70px; }
        footer { background: rgba(35,70,45,0.95); padding: 50px 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        footer p { font-size: 11px; color: rgba(255,255,255,0.6); line-height: 2; letter-spacing: 1px; }
        /* Mobile */
        @media (max-width: 768px) {
            nav { padding: 14px 20px; }
            nav .logo-area .logo-main { font-size: 18px; letter-spacing: 3px; }
            nav .logo-area .logo-sub { font-size: 18px; }
            .hamburger { display: block; }
            nav .nav-links {
                display: none;
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                width: 100%; height: 100vh;
                flex-direction: column; gap: 0;
                background: #fff;
                overflow-y: auto;
                padding-top: 80px;
                z-index: 99;
            }
            nav .nav-links.open { display: flex; }
            nav .nav-links > li { width: 100%; border-bottom: 1px solid #eee; }
            nav .nav-links > li > a {
                color: #222 !important; font-size: 18px; font-weight: 700;
                letter-spacing: 1px; padding: 22px 28px; display: block; width: 100%;
            }
            nav .nav-links > li > a:active { background: #f5f5f5; color: #000 !important; }
            nav .nav-links > li.lang-selector { padding: 16px 28px; }
            .lang-btn { color: #222; border-color: rgba(0,0,0,0.2); font-size: 14px; }
            .lang-dropdown { position: static; margin-top: 10px; box-shadow: none; border: 1px solid #ddd; }
            footer { padding: 30px 20px; }
        }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <nav>
        <div class="logo-area">
            <a href="#hero"><span class="logo-main">DAEMASU</span><span class="logo-sub">露芽</span></a>
        </div>
        <button class="hamburger" onclick="this.classList.toggle('active');document.querySelector('.nav-links').classList.toggle('open')">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="#hero" onclick="closeMenu()">Home</a></li>
            <li><a href="#medical" onclick="closeMenu()">Medical</a></li>
            <li><a href="#product" onclick="closeMenu()">Product</a></li>
            <li><a href="#check1" onclick="closeMenu()">Check 1</a></li>
            <li><a href="#check2" onclick="closeMenu()">Check 2</a></li>
            <li><a href="#why" onclick="closeMenu()">Why?</a></li>
            <li><a href="#who" onclick="closeMenu()">WHO</a></li>
            <li><a href="#method" onclick="closeMenu()">Instruction</a></li>
            <li class="lang-selector">
                <button class="lang-btn" onclick="document.querySelector('.lang-dropdown').classList.toggle('open')">
                    <span class="flag">🇰🇷</span> 한국어 ▾
                </button>
                <div class="lang-dropdown">
                    <a href="index.html" class="active"><span class="flag">🇰🇷</span> 한국어</a>
                    <a href="jp.html"><span class="flag">🇯🇵</span> 日本語</a>
                </div>
            </li>
        </ul>
    </nav>
    <div id="hero" style="padding-top: 70px;"></div>
    <section id="main-product" class="img-section">
        <img src="대마수 대표이미지/대마수 네이버스토어 메인이미지-20260310-1.1.png" alt="대마수 대표이미지">
    </section>
    <section id="medical" class="img-section">
        <img src="대마수 상세페이지/kr-medical.png?v=9" alt="대마수 상세페이지">
    </section>
    <section id="product" class="img-section">
        <img src="대마수 상세페이지/kr-product.png?v=9" alt="대마수 상세페이지">
    </section>
    <section id="check1" class="img-section">
        <img src="대마수 상세페이지/kr-check1.png?v=9" alt="대마수 상세페이지">
    </section>
    <section id="check2" class="img-section">
        <img src="대마수 상세페이지/kr-check2.png?v=9" alt="대마수 상세페이지">
    </section>
    <section id="why" class="img-section">
        <img src="대마수 상세페이지/kr-why.png?v=9" alt="대마수 상세페이지">
    </section>
    <section id="who" class="img-section">
        <img src="대마수 상세페이지/kr-who.png?v=9" alt="대마수 상세페이지">
    </section>
    <section id="method" class="img-section">
        <img src="대마수 상세페이지/kr-method.png?v=9" alt="대마수 상세페이지">
    </section>
    <footer>
        <div style="display:flex;align-items:baseline;justify-content:center;gap:10px;margin-bottom:12px;">
            <span style="font-size:20px;font-weight:800;color:rgba(255,255,255,0.8);letter-spacing:4px;font-family:'Arial Black','Helvetica Neue',sans-serif;">DAEMASU</span>
            <span style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:2px;">露芽</span>
        </div>
        <p>&copy; 2026. LOA Co. All Rights Reserved.</p>
        <p>로아 | auseon@naver.com</p>
    </footer>
    <script>
    function closeMenu(){document.querySelector('.nav-links').classList.remove('open');document.querySelector('.hamburger').classList.remove('active');}
    document.addEventListener('click',function(e){if(!e.target.closest('.lang-selector')){document.querySelector('.lang-dropdown').classList.remove('open')}});
    </script>
</body>
</html>
