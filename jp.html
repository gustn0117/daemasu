<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOA 大麻水 - 露芽</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #fff; color: #000; }
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(35,70,45,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav .logo-area { display: flex; align-items: center; gap: 12px; }
        nav .logo-area img { height: 40px; width: auto; object-fit: contain; }
        nav .nav-links { display: flex; gap: 30px; list-style: none; align-items: center; }
        nav .nav-links > li { display: flex; align-items: center; }
        nav .nav-links > li > a { color: #fff; text-decoration: none; font-size: 15px; letter-spacing: 2px; font-weight: 600; transition: color 0.3s; }
        nav .nav-links > li > a:hover { color: #ccc; }
        .lang-selector { position: relative; }
        .lang-btn { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #fff; font-size: 15px; letter-spacing: 2px; font-weight: 600; background: none; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; padding: 5px 12px; transition: all 0.3s; }
        .lang-btn:hover { border-color: rgba(255,255,255,0.5); }
        .lang-btn .flag { font-size: 16px; }
        .lang-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); overflow: hidden; min-width: 160px; z-index: 200; }
        .lang-dropdown.open { display: block; }
        .lang-dropdown a { display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: #000 !important; text-decoration: none; font-size: 15px; font-weight: 500; letter-spacing: 0 !important; transition: background 0.2s; white-space: nowrap; }
        .lang-dropdown a:hover { background: #eee; }
        .lang-dropdown a .flag { font-size: 20px; line-height: 1; }
        .lang-dropdown a.active { background: #d4e8da; font-weight: 700; color: #1a3d25 !important; }
        .img-section { width: 100%; max-width: 1200px; margin: 0 auto; line-height: 0; }
        .img-section img { width: 100%; height: auto; display: block; object-fit: contain; }
        #hero { padding-top: 70px; }
        .section-divider { width: 100%; padding: 50px 0; text-align: center; background: #fff; line-height: 1; }
        .section-divider h2 { font-size: 13px; letter-spacing: 5px; font-weight: 300; color: #555; text-transform: uppercase; }
        footer { background: rgba(35,70,45,0.95); padding: 50px 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        footer .footer-logo { height: 30px; width: auto; margin-bottom: 20px; opacity: 0.6; }
        footer p { font-size: 11px; color: rgba(255,255,255,0.6); line-height: 2; letter-spacing: 1px; }
        @media (max-width: 768px) { nav { padding: 12px 20px; } nav .logo-area img { height: 30px; } nav .nav-links { gap: 10px; } nav .nav-links a { font-size: 10px; letter-spacing: 1px; } .section-divider { padding: 30px 0; } .section-divider h2 { font-size: 11px; } footer { padding: 30px 20px; } }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <nav>
        <div class="logo-area">
            <a href="#hero" style="text-decoration:none;"><img src="loa-logo.png" alt="LOA"></a>
        </div>
        <ul class="nav-links">
            <li><a href="#hero">HOME</a></li>
            <li><a href="#medical">MEDICAL</a></li>
            <li><a href="#product">PRODUCT</a></li>
            <li><a href="#check1">CHECK 1</a></li>
            <li><a href="#check2">CHECK 2</a></li>
            <li><a href="#why">WHY?</a></li>
            <li><a href="#who">WHO</a></li>
            <li><a href="#method">INSTRUCTION</a></li>
            <li class="lang-selector">
                <button class="lang-btn" onclick="document.querySelector('.lang-dropdown').classList.toggle('open')">
                    <span class="flag">🇯🇵</span> 日本語 ▾
                </button>
                <div class="lang-dropdown">
                    <a href="index.html"><span class="flag">🇰🇷</span> 한국어</a>
                    <a href="jp.html" class="active"><span class="flag">🇯🇵</span> 日本語</a>
                </div>
            </li>
        </ul>
    </nav>
    <div id="hero" style="padding-top: 70px;"></div>
    <section id="main-product" class="img-section">
        <img src="대마수 대표이미지/대마수 네이버스토어 메인이미지-20260310-1.1.png" alt="大麻水 代表イメージ">
    </section>
    <section id="medical" class="img-section">
        <img src="대마수 상세페이지/jp-medical.png?v=3" alt="大麻水 詳細ページ">
    </section>
    <section id="product" class="img-section">
        <img src="대마수 상세페이지/jp-product.png?v=3" alt="大麻水 詳細ページ">
    </section>
    <section id="check1" class="img-section">
        <img src="대마수 상세페이지/jp-check1.png?v=3" alt="大麻水 詳細ページ">
    </section>
    <section id="check2" class="img-section">
        <img src="대마수 상세페이지/jp-check2.png?v=3" alt="大麻水 詳細ページ">
    </section>
    <section id="why" class="img-section">
        <img src="대마수 상세페이지/jp-why.png?v=3" alt="大麻水 詳細ページ">
    </section>
    <section id="who" class="img-section">
        <img src="대마수 상세페이지/jp-who.png?v=3" alt="大麻水 詳細ページ">
    </section>
    <section id="method" class="img-section">
        <img src="대마수 상세페이지/jp-method.png?v=3" alt="大麻水 詳細ページ">
    </section>
    <footer>
        <p>LOA Inc. | 露芽<br>&copy; 2026 LOA. All Rights Reserved.</p>
    </footer>
    <script>document.addEventListener('click',function(e){if(!e.target.closest('.lang-selector')){document.querySelector('.lang-dropdown').classList.remove('open')}});</script>
</body>
</html>
